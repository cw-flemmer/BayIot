version: "3.8"

services:
  backend:
    build: ./backend
    container_name: bayiot_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - JWT_SECRET=your_very_secure_secret
      - JWT_REFRESH_SECRET=your_very_secure_refresh_secret  
    networks:
      saas:
        ipv4_address: 11.0.1.40
    volumes:
      - images_data:/app/public/images    

  nginx:
    container_name: bayiot_dashboard
    build:
      context: .
      dockerfile: nginx/Dockerfile        
    restart: unless-stopped
    volumes:
      - images_data:/usr/share/nginx/html/images
    ports:
      - "8080:80"
    networks:
      saas:
        ipv4_address: 11.0.1.41
    depends_on:
      - backend

  landingpage:
    container_name: bayiot_landingpage
    build:
      context: .
      dockerfile: landingpage/Dockerfile        
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      saas:
        ipv4_address: 11.0.1.42

volumes:
  images_data:

networks:
  saas:
    external: true 
